spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

server:
  port: ${SERVER_PORT:8080}

app:
  auth:
    jwt-secret: ${APP_JWT_SECRET:replace-with-a-strong-secret-key-at-least-32-characters}
    jwt-expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:120}
    otp-expiration-minutes: ${APP_OTP_EXPIRATION_MINUTES:5}
  mailgun:
    enabled: ${MAILGUN_ENABLED:false}
    fail-open: ${MAILGUN_FAIL_OPEN:true}
    base-url: ${MAILGUN_BASE_URL:https://api.mailgun.net}
    domain: ${MAILGUN_DOMAIN:}
    api-key: ${MAILGUN_API_KEY:}
    from: ${MAILGUN_FROM:}
    sandbox-recipient: ${MAILGUN_SANDBOX_RECIPIENT:}
