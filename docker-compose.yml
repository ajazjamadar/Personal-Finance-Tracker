services:

  mysql:
    image: mysql:8.0
    container_name: finance-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  finance-api:
    build: .
    container_name: finance-app
    restart: on-failure
    ports:
      - "8080:8080"
    
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:local}
      MYSQLHOST: ${MYSQLHOST:mysql}
      MYSQLPORT: ${MYSQLPORT:3306}
      MYSQLDATABASE: ${MYSQLDATABASE:${MYSQL_DATABASE}}
      MYSQLUSER: ${MYSQLUSER:root}
      MYSQLPASSWORD: ${MYSQLPASSWORD:${MYSQL_ROOT_PASSWORD}}
      SERVER_PORT: ${SERVER_PORT:8080}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MINUTES: ${APP_JWT_EXPIRATION_MINUTES:120}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: