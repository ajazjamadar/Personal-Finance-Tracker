services:
  finance-api:
    build: .
    container_name: finance-app
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/finance_tracker_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Root@1234
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    extra_hosts:
      - "host.docker.internal:host-gateway"