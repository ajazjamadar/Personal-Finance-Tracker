spring:
  datasource:
    url: jdbc:h2:mem:finance_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none            # Flyway owns the schema for tests
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:/db/test-migration
    baseline-on-migrate: true

  sql:
    init:
      mode: never

app:
  security:
    disabled: true

