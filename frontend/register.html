<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack | Create Account</title>
  <link rel="icon" type="image/svg+xml" href="assets/fintrack-icon.svg?v=3" />
  <link rel="shortcut icon" href="assets/fintrack-icon.svg?v=3" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-auth-page="register" class="auth-page-body">
  <main class="auth-layout">
    <section class="auth-card">
      <a class="brand" href="index.html" aria-label="FinTrack home">
        <img src="assets/fintrack-logo.svg?v=3" alt="FinTrack" />
      </a>
      <p class="kicker">Create Account</p>
      <h1>Register New User</h1>
      <p class="lead">Create your FinTrack account to begin secure OTP-based login.</p>

      <form id="registerForm" class="auth-form active" novalidate>
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="username" required />

        <label for="fullName">Full Name</label>
        <input id="fullName" type="text" placeholder="John Doe" required />

        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" required />

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Minimum 6 characters" required />

        <button class="btn btn-primary" type="submit">Create Account</button>
      </form>

      <p id="authStatus" class="auth-status">Fill all details to create account.</p>
      <p class="auth-links">
        <a href="user-login.html">Back to User Login</a>
        <a href="admin-login.html">Admin Login</a>
      </p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
